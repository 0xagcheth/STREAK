<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>STREAK — Push Your Luck</title>
  <link rel="stylesheet" href="styles.css?v=32">
  <link rel="stylesheet" href="theme-underground-comic.css?v=1">
</head>
<body class="theme-underground-comic">
  <div id="app">
    <section id="setup" class="panel">
      <header>
        <h1>STREAK</h1>
        <p class="subtitle">First to 200 points</p>
      </header>
      <div class="setup-row">
        <input type="text" id="humanName" placeholder="Player 1">
      </div>
      <button id="btnStart" type="button">Start game</button>
    </section>

    <section id="game" class="panel hidden">
      <div class="game-layout">

        <aside id="totalScoreDisplay" class="scoreboard" aria-live="polite"></aside>

        <div class="deck-panel">
          <div class="deck-wrap" id="deckWrap">
            <div id="deckStack" class="deck-stack" title="Tap to draw a card">
            </div>
            <span class="deck-count" id="deckCount">94</span>
          </div>
          <div id="targetPickerWrap" class="target-picker-wrap hidden" aria-live="polite"></div>
        </div>

        <div class="hand-panel">
          <div class="player-area-cards" id="playerAreaCards"></div>
          <div class="player-area-sum" id="playerAreaSum"></div>
        </div>

        <div class="actions-panel">
          <div class="actions-row">
            <button id="btnDraw" type="button">Draw</button>
            <button id="btnStop" type="button">STOP</button>
          </div>
          <button id="btnNewGame" type="button" class="secondary newgame-wide">New game</button>
          <div id="log" class="mini-log" aria-live="polite"></div>
        </div>

      </div>
      <div id="fxLayer" class="fx-layer" aria-hidden="true"></div>
      <div id="scoreBurstLayer" class="score-burst-layer" aria-hidden="true"></div>
      <div id="eventToast" class="event-toast" aria-live="polite"></div>
      <div id="roundOverlay" class="round-overlay" aria-hidden="true">
        <span id="roundOverlayText">Round over</span>
      </div>
    </section>

    <section id="gameOver" class="panel hidden">
      <h2 id="winnerTitle"></h2>
      <button id="btnNewGameFromOver" type="button">New game</button>
    </section>
  </div>

  <script src="src/app-core.js"></script>
  <script src="src/app-ui.js"></script>
  <script src="src/app-main.js"></script>
</body>
</html>
