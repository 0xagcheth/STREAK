<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <pattern id="slash" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(-18)">
      <rect width="16" height="16" fill="#f4c14f"/>
      <rect x="-2" width="6" height="16" fill="#e65745" opacity="0.7"/>
    </pattern>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="3" fill="#f9e28f" opacity="0.45" />
      <circle cx="18" cy="12" r="2.5" fill="#fef3bf" opacity="0.65" />
      <circle cx="10" cy="20" r="2" fill="#f9e28f" opacity="0.5" />
    </pattern>
  </defs>
  <rect width="320" height="320" fill="url(#slash)"/>
  <rect width="320" height="320" fill="url(#dots)" opacity="0.8"/>
</svg>
