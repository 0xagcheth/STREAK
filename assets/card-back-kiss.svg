<svg xmlns="http://www.w3.org/2000/svg" width="360" height="540" viewBox="0 0 360 540">
  <defs>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4d664"/>
      <stop offset="100%" stop-color="#edbe4b"/>
    </linearGradient>

    <linearGradient id="topWash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9fcac0"/>
      <stop offset="100%" stop-color="#739f95"/>
    </linearGradient>

    <pattern id="paper" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(-20)">
      <rect width="12" height="12" fill="none"/>
      <rect x="-2" width="5" height="12" fill="#17111f" fill-opacity="0.15"/>
      <rect x="7" y="4" width="2" height="2" fill="#fff4d6" fill-opacity="0.25"/>
    </pattern>

    <pattern id="streakTape" width="138" height="62" patternUnits="userSpaceOnUse" patternTransform="rotate(-13)">
      <rect width="138" height="62" fill="#e23645"/>
      <text x="8" y="43" font-family="Anton, Oswald, Impact, sans-serif" font-size="42" letter-spacing="2" fill="#f3d95d">STREAK</text>
      <text x="72" y="56" font-family="Barlow Condensed, Arial, sans-serif" font-size="10" fill="#7c1d27" fill-opacity="0.62">NOIR FOIL</text>
    </pattern>

    <clipPath id="foilClip">
      <path d="M-20 250 L392 170 L392 548 L-10 548 Z"/>
    </clipPath>

    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="15"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="360" height="540" rx="30" fill="url(#base)"/>
  <rect width="360" height="540" rx="30" fill="url(#paper)"/>

  <rect x="0" y="0" width="360" height="252" rx="30" fill="url(#topWash)"/>
  <rect x="0" y="0" width="360" height="252" rx="30" fill="url(#paper)" opacity="0.72"/>

  <!-- Top comic face zone -->
  <g opacity="0.95">
    <path d="M6 218 C44 188 72 158 96 130 C118 104 136 84 162 74 C186 64 214 70 236 86 C258 102 280 128 312 150 C332 164 346 170 360 174 L360 0 L0 0 Z" fill="#77afa2" opacity="0.55"/>

    <path d="M38 34 C72 12 106 8 138 20 C168 32 192 54 206 82 C218 106 220 132 212 154 C204 176 184 194 160 202 C136 210 112 204 96 188 C80 172 72 146 74 118 C76 90 88 64 110 46" fill="none" stroke="#1a1221" stroke-width="7" stroke-linecap="round"/>
    <path d="M126 56 C112 66 104 82 102 100 C100 120 106 140 118 154" fill="none" stroke="#1a1221" stroke-width="6" stroke-linecap="round"/>
    <path d="M122 104 C136 96 152 96 166 102" fill="none" stroke="#1a1221" stroke-width="5" stroke-linecap="round"/>
    <path d="M124 130 C140 124 156 126 170 134" fill="none" stroke="#1a1221" stroke-width="5" stroke-linecap="round"/>
    <path d="M152 148 C164 146 176 150 184 160" fill="none" stroke="#2e203d" stroke-width="5" stroke-linecap="round"/>

    <path d="M14 70 C44 54 72 56 96 72 C116 88 130 108 136 130" fill="none" stroke="#2b1f39" stroke-width="6" stroke-linecap="round"/>
    <path d="M42 16 C78 -2 118 2 154 24 C184 42 208 68 222 94" fill="none" stroke="#2b1f39" stroke-width="6" stroke-linecap="round"/>
    <path d="M238 24 C262 12 290 14 310 30 C328 44 338 66 342 88" fill="none" stroke="#2b1f39" stroke-width="6" stroke-linecap="round"/>

    <path d="M58 178 C96 162 134 164 170 178 C198 188 226 194 262 194 C296 194 328 186 360 170" fill="none" stroke="#1a1221" stroke-width="6" stroke-linecap="round" opacity="0.52"/>

    <!-- dense vertical accent lines from refs -->
    <path d="M18 0 L24 30" stroke="#2c1f3a" stroke-width="4" opacity="0.58"/>
    <path d="M54 0 L60 36" stroke="#2c1f3a" stroke-width="4" opacity="0.58"/>
    <path d="M90 0 L96 42" stroke="#2c1f3a" stroke-width="4" opacity="0.58"/>
    <path d="M126 0 L132 48" stroke="#2c1f3a" stroke-width="4" opacity="0.58"/>
    <path d="M162 0 L168 54" stroke="#2c1f3a" stroke-width="4" opacity="0.58"/>
    <path d="M198 0 L204 60" stroke="#2c1f3a" stroke-width="4" opacity="0.58"/>
    <path d="M234 0 L240 66" stroke="#2c1f3a" stroke-width="4" opacity="0.58"/>
    <path d="M270 0 L276 72" stroke="#2c1f3a" stroke-width="4" opacity="0.58"/>
    <path d="M306 0 L312 78" stroke="#2c1f3a" stroke-width="4" opacity="0.58"/>
  </g>

  <!-- Bottom foil block exactly in requested vibe -->
  <g clip-path="url(#foilClip)">
    <rect x="-50" y="170" width="470" height="400" fill="url(#streakTape)"/>
    <path d="M-24 258 L394 176" stroke="#831c26" stroke-width="10" opacity="0.42"/>
    <path d="M-32 290 L386 208" stroke="#831c26" stroke-width="10" opacity="0.38"/>
    <path d="M-40 322 L378 240" stroke="#831c26" stroke-width="10" opacity="0.34"/>
    <path d="M-48 354 L370 272" stroke="#831c26" stroke-width="10" opacity="0.30"/>
    <path d="M-56 386 L362 304" stroke="#831c26" stroke-width="10" opacity="0.27"/>
  </g>

  <path d="M-20 250 L392 170" stroke="#1c1424" stroke-width="10" opacity="0.34"/>
  <path d="M-14 264 L398 184" stroke="#f8da83" stroke-width="4" opacity="0.32"/>

  <rect width="360" height="540" rx="30" filter="url(#grain)"/>
  <rect x="12" y="12" width="336" height="516" rx="26" fill="none" stroke="#17101f" stroke-width="12"/>
</svg>
